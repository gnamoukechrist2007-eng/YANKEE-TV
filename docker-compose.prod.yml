services:
  iptv-postgres:
    image: postgres:16-alpine
    container_name: iptv-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: iptv
      POSTGRES_USER: iptv
      POSTGRES_PASSWORD: ${IPTV_PG_PASSWORD}
    volumes:
      - iptv-postgres-data:/var/lib/postgresql/data
    networks:
      - mlb-compute_default
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U iptv -d iptv"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

  iptv-web:
    build:
      context: .
      dockerfile: Dockerfile
    image: iptv-web:latest
    container_name: iptv-web
    restart: unless-stopped
    depends_on:
      iptv-postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://iptv:${IPTV_PG_PASSWORD}@iptv-postgres:5432/iptv
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_URL: https://tv.thorsteinson.com
      AUTH_TRUST_HOST: "true"
      AUTH_GOOGLE_ID: ${AUTH_GOOGLE_ID}
      AUTH_GOOGLE_SECRET: ${AUTH_GOOGLE_SECRET}
      TV_ALLOWED_EMAILS: ${TV_ALLOWED_EMAILS}
      IPTV_ENC_KEY: ${IPTV_ENC_KEY}
    networks:
      - mlb-compute_default
    deploy:
      resources:
        limits: { memory: 512M }
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

volumes:
  iptv-postgres-data:

networks:
  mlb-compute_default:
    external: true
